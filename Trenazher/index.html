<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏋️ Тренажёр разработки продуктов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo">🏋️</span>
      <h2>Тренажёр</h2>
    </div>
    <div class="progress-ring-container">
      <svg class="progress-ring" width="100" height="100">
        <circle class="progress-ring-bg" cx="50" cy="50" r="42"/>
        <circle class="progress-ring-fill" id="progressRing" cx="50" cy="50" r="42"/>
      </svg>
      <div class="progress-text" id="progressText">0%</div>
    </div>
    <nav class="nav-steps" id="navSteps"></nav>
    <div class="sidebar-footer">
      <button class="btn-reset" onclick="resetProgress()">🔄 Сбросить прогресс</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main" id="main">
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
    <div class="content" id="content"></div>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
